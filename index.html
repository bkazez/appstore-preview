<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store preview</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1d1d1f;
    --muted: #86868b;
    --hair: #d2d2d7;
    --blue: #0070e0;
    --chip: #f2f2f7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --fg: #f5f5f7;
      --muted: #8e8e93;
      --hair: #2c2c2e;
      --blue: #2e8bff;
      --chip: #1c1c1e;
    }
  }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.45;
  }
  .device {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    border-left: 1px solid var(--hair);
    border-right: 1px solid var(--hair);
    padding-bottom: 60px;
  }

  /* Nav */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; padding: 0 16px;
    border-bottom: 1px solid var(--hair);
    position: sticky; top: 0; background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    z-index: 10;
  }
  .nav .back { color: var(--blue); font-size: 17px; display: flex; align-items: center; gap: 4px; }
  .nav .chev { font-size: 22px; line-height: 1; margin-top: -2px; }
  .nav .title { font-weight: 600; font-size: 17px; opacity: 0; }

  /* Header */
  .header { display: flex; gap: 16px; padding: 20px; align-items: flex-start; }
  .icon {
    width: 118px; height: 118px; border-radius: 26px; flex: none;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.12) inset;
    background-size: cover; background-position: center;
  }
  .head-meta { flex: 1; min-width: 0; padding-top: 2px; }
  .app-name { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.15; }
  .app-sub { color: var(--muted); font-size: 15px; margin-top: 3px; }
  .head-dev { color: var(--blue); font-size: 13px; margin-top: 14px; }

  .actions { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 6px; }
  .get {
    background: var(--blue); color: #fff; border: none; font-weight: 700;
    font-size: 16px; padding: 7px 26px; border-radius: 999px; min-width: 84px;
  }
  .iap { color: var(--muted); font-size: 11px; text-align: center; margin: 2px 20px 0; }
  .share { color: var(--blue); font-size: 22px; }

  /* Facts row */
  .facts {
    display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
    border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair);
    margin-top: 16px; padding: 14px 0;
  }
  .fact { text-align: center; padding: 0 8px; border-right: 1px solid var(--hair); }
  .fact:last-child { border-right: none; }
  .fact .k { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .fact .v { font-size: 17px; font-weight: 700; margin-top: 5px; }
  .fact .v small { font-size: 11px; font-weight: 600; color: var(--muted); }
  .fact .sub { color: var(--muted); font-size: 11px; margin-top: 3px; }

  /* Section */
  .section { padding: 22px 20px 6px; }
  .section h2 { font-size: 22px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.3px; }

  /* Screens */
  .shots { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 4px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .shots::-webkit-scrollbar { display: none; }
  .shot { flex: none; width: 232px; scroll-snap-align: start; }
  .shot img { width: 100%; border-radius: 18px; display: block; box-shadow: 0 0 0 0.5px var(--hair); }
  .shot .cap { color: var(--muted); font-size: 12px; margin-top: 8px; text-align: center; }

  /* Description */
  .desc { padding: 4px 20px 0; font-size: 15px; white-space: pre-wrap; }
  .desc.clamped { max-height: 9.2em; overflow: hidden; -webkit-mask-image: linear-gradient(180deg,#000 70%,transparent); }
  .more { color: var(--blue); font-size: 15px; font-weight: 600; padding: 6px 20px 0; cursor: pointer; display: inline-block; }
  .dev-line { color: var(--blue); font-size: 15px; padding: 16px 20px 0; }

  /* Info table */
  .info { padding: 8px 20px 0; }
  .info .row { display: flex; justify-content: space-between; gap: 16px; padding: 12px 0; border-bottom: 1px solid var(--hair); font-size: 14px; }
  .info .row .k { color: var(--muted); }
  .info .row .v { text-align: right; color: var(--fg); max-width: 60%; }

  .note { max-width: 430px; margin: 0 auto; padding: 20px; color: var(--muted); font-size: 12px; }
  .note strong { color: var(--fg); }

  .error { max-width: 430px; margin: 0 auto; padding: 40px 20px; color: var(--muted); font-size: 15px; }
  .error a { color: var(--blue); }
</style>
</head>
<body>
<div class="device" id="device" hidden>

  <div class="nav">
    <span class="back"><span class="chev">&lsaquo;</span>Search</span>
    <span class="title" id="navTitle"></span>
    <span class="share">&#xF472;</span>
  </div>

  <div class="header">
    <div class="icon" id="icon"></div>
    <div class="head-meta">
      <div class="app-name" id="appName"></div>
      <div class="app-sub" id="appSub"></div>
      <div class="head-dev" id="appDev"></div>
    </div>
  </div>

  <div class="actions">
    <button class="get">GET</button>
    <span class="share" style="color:var(--blue)">&#xF472;</span>
  </div>
  <div class="iap" id="iapLine">In-App Purchases</div>

  <div class="facts" id="facts"></div>

  <div class="section"><h2>Preview</h2></div>
  <div class="shots" id="shots"></div>

  <div class="section" style="padding-bottom:0"><h2>About</h2></div>
  <div class="desc clamped" id="desc"></div>
  <span class="more" id="more">more</span>

  <div class="dev-line" id="devLine"></div>

  <div class="section"><h2>Information</h2></div>
  <div class="info" id="info"></div>

</div>

<div class="note" id="note" hidden></div>
<div class="error" id="error" hidden></div>

<script>
  // A reusable App Store listing preview. The page is pure template; every
  // app-specific value comes from apps/<slug>/app.json (+ its assets/ folder),
  // so a new app is just a new folder. Pick the app with ?app=<slug>.
  const params = new URLSearchParams(location.search);
  const slug = params.get('app') || 'wavelength';
  const base = `apps/${slug}/`;

  function el(id) { return document.getElementById(id); }
  function set(id, text) { el(id).textContent = text || ''; }

  function fact(f) {
    const sub = f.sub ? `<div class="sub">${f.sub}</div>` : '';
    return `<div class="fact"><div class="k">${f.k}</div><div class="v">${f.v}</div>${sub}</div>`;
  }

  function renderShots(shots) {
    el('shots').innerHTML = shots.map(s => `
      <div class="shot">
        <img src="${base}${s.src}" alt="${(s.alt || s.caption || '').replace(/"/g, '&quot;')}">
        ${s.caption ? `<div class="cap">${s.caption}</div>` : ''}
      </div>`).join('');
  }

  function renderInfo(rows) {
    el('info').innerHTML = rows.map(r =>
      `<div class="row"><span class="k">${r.k}</span><span class="v">${r.v}</span></div>`).join('');
  }

  async function render() {
    let app;
    try {
      const res = await fetch(`${base}app.json`);
      if (!res.ok) throw new Error(res.status);
      app = await res.json();
    } catch (e) {
      el('error').hidden = false;
      el('error').innerHTML = `No preview found for <strong>${slug}</strong>. ` +
        `Add <code>apps/${slug}/app.json</code>, or try <a href="?app=wavelength">?app=wavelength</a>.`;
      return;
    }

    document.title = `${app.name} - App Store preview`;
    set('navTitle', app.name);
    el('icon').style.backgroundImage = `url('${base}${app.icon}')`;
    set('appName', app.name);
    set('appSub', app.subtitle);
    set('appDev', app.developer);
    set('iapLine', app.iap === false ? '' : 'In-App Purchases');
    set('devLine', app.developer ? `${app.developer} ›` : '');

    const facts = app.facts || [];
    el('facts').innerHTML = facts.map(fact).join('');

    renderShots(app.screenshots || []);
    set('desc', app.description);
    renderInfo(app.info || []);

    if (app.note) { el('note').hidden = false; el('note').innerHTML = app.note; }
    el('device').hidden = false;

    el('more').addEventListener('click', function () {
      el('desc').classList.remove('clamped');
      this.style.display = 'none';
    });
  }

  render();
</script>
</body>
</html>
